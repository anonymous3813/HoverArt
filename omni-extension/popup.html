<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omni — Voice Assistant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      min-height: 480px;
      background: #070710;
      color: #e0e0f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    .header {
      background: rgba(13,13,26,0.95);
      border-bottom: 1px solid rgba(0,245,255,0.3);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 20px;
      font-weight: 900;
      color: white;
    }

    .logo-icon {
      color: #00f5ff;
      font-size: 24px;
    }

    .settings-btn {
      width: 32px;
      height: 32px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .settings-btn:hover {
      border-color: #00f5ff;
      color: #00f5ff;
    }

    .main-content {
      padding: 20px;
    }

    .voice-section {
      text-align: center;
      margin-bottom: 20px;
    }

    .voice-button {
      width: 120px;
      height: 120px;
      background: radial-gradient(circle, rgba(0,245,255,0.1) 0%, transparent 70%);
      border: 2px solid rgba(0,245,255,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      z-index: 5;
    }

    .voice-button:hover {
      border-color: rgba(0,245,255,0.6);
      transform: scale(1.05);
    }

    .voice-button.active {
      border-color: #00f5ff;
      box-shadow: 0 0 40px rgba(0,245,255,0.4);
      animation: pulse-mic 2s ease-in-out infinite;
    }

    @keyframes pulse-mic {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .voice-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .mic-svg {
      width: 48px;
      height: 48px;
      fill: #00f5ff;
    }

    .voice-button.active .mic-svg {
      fill: #ffffff;
    }
    .command-ticker-label {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.42);
      margin-bottom: 8px;
    }

    .ticker-window {
      position: relative;
      z-index: 2;
      overflow: hidden;
      width: 100%;
      margin-bottom: 12px;
      mask-image: linear-gradient(
        90deg,
        transparent,
        black 10%,
        black 90%,
        transparent
      );
      -webkit-mask-image: linear-gradient(
        90deg,
        transparent,
        black 10%,
        black 90%,
        transparent
      );
    }

    .ticker-track {
      display: flex;
      width: max-content;
      animation: ticker-scroll 55s linear infinite;
      will-change: transform;
    }

    .ticker-track:hover {
      animation-play-state: paused;
    }

    @keyframes ticker-scroll {
      from {
        transform: translateX(0);
      }
      to {
        transform: translateX(-50%);
      }
    }

    .ticker-seg {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      gap: 24px;
      padding-right: 24px;
    }

    .ticker-seg span {
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      white-space: nowrap;
    }

    .ticker-dot {
      color: rgba(0,245,255,0.35);
      font-weight: 700;
    }

    .status-text {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 8px;
      min-height: 1.3em;
    }

    .transcript {
      min-height: 56px;
      padding: 12px;
      background: rgba(0,245,255,0.05);
      border: 1px solid rgba(0,245,255,0.2);
      border-radius: 8px;
      font-size: 13px;
      color: white;
      margin-bottom: 16px;
    }

    .quick-actions {
      margin-bottom: 16px;
    }

    .quick-actions h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.5);
      margin-bottom: 12px;
    }

    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .action-btn {
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: rgba(255,255,255,0.85);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      font-family: inherit;
    }

    .action-btn:hover {
      border-color: rgba(0,245,255,0.5);
      background: rgba(0,245,255,0.05);
      color: white;
    }

    .skill-count {
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .skill-number {
      font-size: 20px;
      font-weight: 900;
      color: #00f5ff;
    }

    .footer {
      padding: 12px 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
    }

    .footer-link {
      color: #00f5ff;
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      font: inherit;
      padding: 0;
    }

    .footer-link:hover {
      text-decoration: underline;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <span class="logo-icon">◈</span>
      <span>Omni</span>
    </div>
    <button type="button" class="settings-btn" id="settingsBtn" title="Extension options" aria-label="Options">
      <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
        <path fill="currentColor" d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/>
      </svg>
    </button>
  </div>

  <div class="main-content">
    <div class="voice-section">
      <button type="button" class="voice-button" id="voiceBtn" title="Speak" aria-label="Speak to Omni">
        <svg class="mic-svg" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3.41 3.51 6.06 7 6.44V20H8c-.55 0-1 .45-1 1s.45 1 1 1h8c.55 0 1-.45 1-1s-.45-1-1-1h-2v-2.54c3.49-.38 6.51-3.03 7-6.44.1-.6-.39-1.14-1-1.14z"/>
        </svg>
      </button>
      <div class="command-ticker-label">Example commands</div>
      <div class="ticker-window">
        
        <div class="ticker-track" id="tickerTrack">
          <div class="ticker-seg" id="tickerSegA"></div>
          <div class="ticker-seg" id="tickerSegB"></div>
        </div>
      </div>
      <div class="status-text" id="statusText">Click the mic to speak</div>
      <div class="transcript" id="transcript">Your command appears here...</div>
    </div>

    <div class="quick-actions">
      <h3>Quick actions</h3>
      <div class="action-buttons">
        <button type="button" class="action-btn" data-action="summarize">Summarize page</button>
        <button type="button" class="action-btn" data-action="read">Read content</button>
        <button type="button" class="action-btn" data-action="extract">Extract text</button>
        <button type="button" class="action-btn" data-action="screenshot">Screenshot</button>
      </div>
    </div>

    <div class="skill-count" id="skillCount">
      <span>Skills learned</span>
      <span class="skill-number" id="skillNumber">0</span>
    </div>
  </div>

  <div class="footer">
    <span>Omni Extension v1.0</span>
    <button type="button" class="footer-link" id="viewTreeLink">Skill tree</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
