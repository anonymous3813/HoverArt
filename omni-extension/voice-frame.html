<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Omni voice</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 132px;
      height: 132px;
      overflow: hidden;
      background: transparent;
      font-family: system-ui, sans-serif;
    }
    .wrap {
      width: 132px;
      height: 132px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    button#vfMic {
      width: 120px;
      height: 120px;
      border: 2px solid rgba(0,245,255,0.35);
      border-radius: 50%;
      cursor: pointer;
      background: radial-gradient(circle, rgba(0,245,255,0.12) 0%, transparent 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    button#vfMic:hover {
      border-color: rgba(0,245,255,0.65);
      transform: scale(1.03);
    }
    button#vfMic.listening {
      border-color: #00f5ff;
      box-shadow: 0 0 36px rgba(0,245,255,0.45);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
    .mic-svg { width: 48px; height: 48px; fill: #00f5ff; }
    button#vfMic.listening .mic-svg { fill: #fff; }
  </style>
</head>
<body>
  <div class="wrap">
    <button type="button" id="vfMic" aria-label="Start speaking" title="Click to speak">
      <svg class="mic-svg" viewBox="0 0 24 24">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3.41 3.51 6.06 7 6.44V20H8c-.55 0-1 .45-1 1s.45 1 1 1h8c.55 0 1-.45 1-1s-.45-1-1-1h-2v-2.54c3.49-.38 6.51-3.03 7-6.44.1-.6-.39-1.14-1-1.14z"/>
      </svg>
    </button>
  </div>
  <script src="voice-frame.js"></script>
</body>
</html>
